<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumit's Website</title>

<style>body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#f2f2f2,#9e9e9e);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:340px;
    background:rgba(255,255,255,0.9);
    border-radius:25px;
    padding:35px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #fff;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

h1{
    font-size:34px;
    color:#222;
    margin:15px 0 10px;
}

p{
    color:#555;
    font-size:18px;
    line-height:1.6;
}

button{
    margin-top:20px;
    background:#111;
    color:white;
    border:none;
    padding:14px 35px;
    font-size:18px;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#444;
    transform:scale(1.05);
}

.card:hover{
    transform:translateY(-8px);
    transition:0.4s;
};
}
</style>

</head>
<body>

<div class="card">

<img src="Image.png" alt="Profile">

<h1>Hello, I'm Sumit 👋</h1>

<p>I want to become a successful Web Developer.</p>

<button onclick="hello()">Contact Me</button>

</div>

<script>
function hello(){
    alert("Welcome to my Website!👋");
}
</script>

</body>
</html>
